<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Study Guard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #0d6efd, #6610f2);
            color: white;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.7);
        }

        /* Sidebar */
/* 🔥 GLASS SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;

    background: rgba(15, 23, 42, 0.6); /* transparent */
    backdrop-filter: blur(15px); /* glass effect */

    padding-top: 20px;
    box-shadow: 4px 0 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

/* Title */
.sidebar h5 {
    color: #e2e8f0;
    text-align: center;
    margin-bottom: 25px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* Links */
.sidebar a {
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 12px 18px;
    margin: 8px 12px;

    color: #cbd5e1;
    text-decoration: none;
    border-radius: 10px;

    transition: all 0.3s ease;
}

/* ✨ Hover Animation */
.sidebar a:hover {
    background: rgba(59, 130, 246, 0.7);
    color: white;

    transform: translateX(8px) scale(1.03);
    box-shadow: 0 0 12px rgba(59,130,246,0.6);
}

/* 🔥 Active Link */
.sidebar a.active {
    background: linear-gradient(90deg, #2563eb, #7c3aed);
    color: white;
    box-shadow: 0 0 15px rgba(124,58,237,0.6);
}

/* ✨ Smooth page feel */
.sidebar a {
    position: relative;
    overflow: hidden;
}

/* Shine effect on hover */
.sidebar a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.2),
        transparent
    );

    transition: 0.5s;
}

.sidebar a:hover::before {
    left: 100%;
}

        /* Cards */
        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.main-content {
    margin-left: 250px;
    padding: 20px;
    transition: 0.3s;
}
.sidebar {
    animation: slideIn 0.6s ease;
}

@keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
.notes-card {
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
}

.single-note {
    background: rgba(255,255,255,0.12);
    border-radius: 14px;
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
}

.single-note:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

.empty-box {
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    color: #e2e8f0;
}

form input,
form select,
form textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.9);
    color: #111827;
}

form label {
    color: #f8fafc;
    font-weight: 500;
}
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand text-white fw-bold" href="/">SmartStudy</a>

    <div class="ms-auto">
        {% if user.is_authenticated %}
            <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
        {% endif %}
    </div>
</nav>

<!-- 🔥 SIDEBAR -->
{% if user.is_authenticated %}
<div class="sidebar">
    <h5>Menu</h5>

    <a href="{% url 'student_dashboard' %}" 
       class="{% if 'dashboard' in request.path %}active{% endif %}">
        🏠 Dashboard
    </a>

    <a href="{% url 'student_notes' %}" 
       class="{% if 'notes' in request.path %}active{% endif %}">
        📚 Notes
    </a>

    <a href="{% url 'quiz_home' %}" 
       class="{% if 'quiz' in request.path %}active{% endif %}">
        🧠 Quiz
    </a>

    <a href="{% url 'student_progress' %}" 
       class="{% if 'progress' in request.path %}active{% endif %}">
        📊 Progress
    </a>
</div>
{% endif %}

<!-- 🔥 MAIN CONTENT -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
