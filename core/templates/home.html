{% extends 'base.html' %}

{% block content %}

<style>
    body {
      background: linear-gradient(120deg, #0d6efd, #6610f2);
      color: #fff;
    }

    .btn-custom {
      background: #fff;
      color: #0d6efd;
      font-weight: 600;
      border-radius: 50px;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background: #f8f9fa;
      transform: scale(1.05);
    }
</style>

<div class="container text-center d-flex flex-column justify-content-center align-items-center" style="min-height:80vh;">
    
    <h1 class="fw-bold mb-3">Smart Study Guard</h1>

    <p class="lead mb-4">
        An all-in-one platform for Students and Parents to track learning,
        manage notes, and monitor progress.
    </p>

    <div>
        <a href="{% url 'login' %}" class="btn btn-custom me-2 px-4">Login</a>

        <a href="{% url 'student_signup' %}" class="btn btn-light px-4 me-2">
            Student Signup
        </a>

        <a href="{% url 'parent_signup' %}" class="btn btn-light px-4">
            Parent Signup
        </a>
    </div>

</div>

{% endblock %}
