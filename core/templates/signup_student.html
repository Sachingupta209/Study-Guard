{% if error %}
<div style="color:red;">
    {{ error }}
</div>
{% endif %}
{% extends 'base.html' %}
{% block content %}


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Signup |  Study Guard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #20c997);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      border-radius: 1rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .form-container {
    background: white;
    padding: 40px;
    width: 420px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
    input
{
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;

    background: #ffffff;
    color: #000000;

    font-size: 16px;
    outline: none;
  }
input::placeholder {
    color: #666;
}
label {
    color: #222;
    font-weight: 600;
}
  </style>
</head>
<body>

<div class="card p-4" style="width: 400px;">
  <h3 class="text-center text-primary mb-4">Student Signup</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-warning py-1">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Class/Semester</label>
      <input type="text" name="class_semester" class="form-control" required />
    </div>
    <button type="submit" class="btn btn-success w-100">Register</button>
{% endblock %}
