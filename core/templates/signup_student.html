{% extends 'base.html' %}

{% block content %}

<div class="signup-wrapper">

    <div class="signup-card">

        <h2>Student Signup</h2>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <div class="message-box">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>
                <input 
                    type="text" 
                    name="name" 
                    placeholder="Enter full name"
                    required
                >
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter email"
                    required
                >
            </div>

            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter password"
                    required
                >
            </div>

            <div class="form-group">
                <label>Class / Semester</label>
                <input 
                    type="text" 
                    name="class_semester" 
                    placeholder="Example: BCA Sem 5"
                    required
                >
            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="/login/">Login</a>
        </div>

    </div>

</div>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0d6efd,#20c997);
    min-height:100vh;
}

.signup-wrapper{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.signup-card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.signup-card h2{
    text-align:center;
    margin-bottom:30px;
    color:#0d6efd;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#222;
    font-size:15px;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}

.form-group input:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 5px rgba(13,110,253,0.3);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#198754;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#157347;
}

.error-box{
    background:#f8d7da;
    color:#842029;
    padding:10px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
}

.message-box{
    background:#fff3cd;
    color:#664d03;
    padding:10px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
}

.login-link{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.login-link a{
    color:#0d6efd;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

{% endblock %}
