{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card-box">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="text-primary">
                {{ quiz.subject }} Quiz
            </h2>

            <span class="badge bg-primary fs-6">

                Total Questions:
                {{ questions|length }}

            </span>

        </div>

        
        <form method="POST" action="/student/quiz/submit/{{ quiz.id }}/">>

            {% csrf_token %}

            {% for q in questions %}

            <div class="card mb-4 border-0 shadow-sm">

                <div class="card-body">

                    <h5 class="mb-4">

                        Q{{ forloop.counter }}.
                        {{ q.question_text }}

                    </h5>

                    <div class="form-check mb-3">

                        <input
                        class="form-check-input"
                        type="radio"
                        name="{{ q.id }}"
                        value="{{ q.option_a }}"
                        required>

                        <label class="form-check-label">

                            {{ q.option_a }}

                        </label>

                    </div>

                    <div class="form-check mb-3">

                        <input
                        class="form-check-input"
                        type="radio"
                        name="{{ q.id }}"
                        value="{{ q.option_b }}">

                        <label class="form-check-label">

                            {{ q.option_b }}

                        </label>

                    </div>

                    <div class="form-check mb-3">

                        <input
                        class="form-check-input"
                        type="radio"
                        name="{{ q.id }}"
                        value="{{ q.option_c }}">

                        <label class="form-check-label">

                            {{ q.option_c }}

                        </label>

                    </div>

                    <div class="form-check">

                        <input
                        class="form-check-input"
                        type="radio"
                        name="{{ q.id }}"
                        value="{{ q.option_d }}">

                        <label class="form-check-label">

                            {{ q.option_d }}

                        </label>

                    </div>

                </div>

            </div>

            {% endfor %}

            <button
            type="submit"
            class="btn btn-success btn-lg w-100">

                Submit Quiz

            </button>

        </form>

    </div>

</div>

{% endblock %}
