{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card-box">

                <h2 class="text-center text-primary mb-4">
                    Login
                </h2>

                {% if messages %}
                    {% for message in messages %}

                        <div class="alert alert-warning">
                            {{ message }}
                        </div>

                    {% endfor %}
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Email Address
                        </label>

                        <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter email"
                        required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>

                    </div>

                    <button
                    type="submit"
                    class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <div class="text-center mt-4">

                    <p>
                        Don't have an account?
                    </p>

                    <a href="/signup/student/"
                    class="btn btn-success">

                        Student Signup

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
