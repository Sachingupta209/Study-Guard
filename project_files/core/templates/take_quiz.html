<!DOCTYPE html>
<html>
<head>
  <title>{{ quiz.subject }} Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h3 class="text-center mb-4">{{ quiz.subject }} Quiz</h3>

  <form method="POST" action="{% url 'submit_quiz' quiz.id %}">
    {% csrf_token %}

    {% for q in questions %}
      <div class="mb-4 p-3 border rounded">
        <p><strong>Q{{ forloop.counter }}.</strong> {{ q.question_text }}</p>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option_a }}" required>
          <label class="form-check-label">{{ q.option_a }}</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option_b }}">
          <label class="form-check-label">{{ q.option_b }}</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option_c }}">
          <label class="form-check-label">{{ q.option_c }}</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option_d }}">
          <label class="form-check-label">{{ q.option_d }}</label>
        </div>
      </div>
    {% endfor %}

    <div class="text-center">
      <button type="submit" class="btn btn-primary btn-lg">
        Submit Quiz
      </button>
    </div>
  </form>
</div>

</body>
</html>
