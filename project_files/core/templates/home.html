<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Study Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #0d6efd, #6610f2);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .btn-custom {
      background: #fff;
      color: #0d6efd;
      font-weight: 600;
      border-radius: 50px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #f8f9fa;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="fw-bold mb-3"> Smart Study Guard</h1>
    <p class="lead mb-4">An all-in-one platform for Students and Parents to track learning, manage notes, and monitor progress.</p>
    <div>
      <a href="{% url 'login' %}" class="btn btn-custom me-2 px-4">Login</a>
      <a href="{% url 'student_signup' %}" class="btn btn-light px-4">Student Signup</a>
      <a href="{% url 'parent_signup' %}" class="btn btn-light px-4">Parent Signup</a>
    </div>
  </div>
</body>
</html>
