<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Signup | Smart Study Guard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #6f42c1, #e83e8c);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      border-radius: 1rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<div class="card p-4" style="width: 400px;">
  <h3 class="text-center text-primary mb-4">Parent Signup</h3>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-warning py-1">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Student Email (to link account)</label>
      <input type="email" name="student_email" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success w-100">Sign Up</button>
  </form>

  <div class="text-center mt-3">
    <small class="text-muted">Already have an account?</small><br>
    <a href="{% url 'login' %}" class="text-decoration-none">Login here</a>
  </div>
</div>

</body>
</html>
